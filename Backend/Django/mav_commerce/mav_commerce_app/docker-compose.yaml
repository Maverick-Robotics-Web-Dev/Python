services:
  # Django App
  django_backend:
    container_name: django_backend
    build: .
    command: uvicorn mav_commerce_app.asgi:application --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - 8000:8000
    depends_on:
      - django_redis

  #Redis
  django_redis:
    image: redis:latest
    container_name: django_redis
    ports:
      - 6379:6379

  django_db:
    image: mysql:latest
    container_name: django_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: mav7690
      MYSQL_DATABASE: mav_commerce_db
      MYSQL_USER: maverick
      MYSQL_PASSWORD: mav7690
    ports:
      - 3308:3306
    volumes:
      - db_data:/var/lib/mysql
volumes:
  db_data:
