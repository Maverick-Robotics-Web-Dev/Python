services:
  # Django App
  django_backend:
    container_name: django_backend
    build: .
    command: uvicorn mav_commerce_app.asgi:application --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - 8000:8000
    depends_on:
      - django_redis

  #Redis
  django_redis:
    image: redis:latest
    container_name: django_redis
    ports:
      - 6379:6379
